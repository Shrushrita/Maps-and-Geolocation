
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.25rem; }
.controls input, .controls select { flex: 1; min-width: 140px; }
.results-count { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; }
.gha-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
.gha-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; user-select: none; }
.gha-num { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; font-weight: 500; padding: 3px 10px; color: var(--color-text-secondary); }
.gha-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.species-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { font-size: 12px; padding: 3px 9px; border-radius: var(--border-radius-md); border: 0.5px solid; }
.chip-deer { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }
.chip-moose { background: #E1F5EE; color: #0F6E56; border-color: #9FE1CB; }
.chip-elk { background: #EEEDFE; color: #3C3489; border-color: #CECBF6; }
.chip-caribou { background: #FAEEDA; color: #854F0B; border-color: #FAC775; }
.chip-bear { background: #FAECE7; color: #993C1D; border-color: #F5C4B3; }
.chip-wolf { background: #F1EFE8; color: #5F5E5A; border-color: #D3D1C7; }
.chip-turkey { background: #FCEBEB; color: #A32D2D; border-color: #F7C1C1; }
.chip-muledeer { background: #FBEAF0; color: #993556; border-color: #F4C0D1; }
.detail { display: none; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 10px; }
.detail.open { display: block; }
.species-section { margin-bottom: 12px; }
.species-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.species-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; }
.toggle-icon { margin-left: auto; font-size: 13px; color: var(--color-text-secondary); }
.no-results { font-size: 14px; color: var(--color-text-secondary); padding: 2rem 0; text-align: center; }
</style>

<div class="wrap">
  <div class="controls">
    <input type="text" id="search" placeholder="Search by GHA number or keyword..." style="min-width:200px;" />
    <select id="species-filter">
      <option value="">All species</option>
      <option value="deer">White-tailed deer</option>
      <option value="moose">Moose</option>
      <option value="elk">Elk</option>
      <option value="caribou">Caribou</option>
      <option value="bear">Black bear</option>
      <option value="wolf">Wolf / coyote</option>
      <option value="turkey">Wild turkey</option>
      <option value="muledeer">Mule deer</option>
    </select>
  </div>
  <div class="results-count" id="results-count"></div>
  <div id="cards"></div>
</div>

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sp = document.getElementById('species-filter').value;

  const filtered = raw.filter(g => {
    const idMatch = g.id.toLowerCase().includes(q);
    const textMatch = Object.values(g).some(v => typeof v === 'string' && v.toLowerCase().includes(q));
    const matchesSearch = !q || idMatch || textMatch;
    const matchesSpecies = !sp || g[sp];
    return matchesSearch && matchesSpecies;
  });

  document.getElementById('results-count').textContent = filtered.length + ' of ' + raw.length + ' game hunting areas';

  const container = document.getElementById('cards');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No areas match your filters.</div>';
    return;
  }

  container.innerHTML = filtered.map(g => {
    const chips = Object.entries(speciesMap)
      .filter(([k]) => g[k])
      .map(([,v]) => `<span class="chip ${v.cls}">${v.label}</span>`)
      .join('');

    const details = ['deer','moose','elk','caribou','bear','wolf','turkey','upland','migratory','muledeer']
      .filter(k => g[k])
      .map(k => `<div class="species-section"><div class="species-label">${speciesLabels[k]}</div><div class="species-text">${g[k]}</div></div>`)
      .join('');

    return `<div class="gha-card">
      <div class="gha-header" onclick="toggle('${g.id}')">
        <span class="gha-num">GHA ${g.id}</span>
        <span class="gha-title">Game Hunting Area ${g.id}</span>
        <span class="toggle-icon" id="icon-${g.id}">▼</span>
      </div>
      <div class="species-chips">${chips || '<span style="font-size:13px;color:var(--color-text-secondary)">No regulated species listed</span>'}</div>
      <div class="detail" id="detail-${g.id}">${details}</div>
    </div>`;
  }).join('');
}

function toggle(id) {
  const d = document.getElementById('detail-' + id);
  const icon = document.getElementById('icon-' + id);
  const open = d.classList.toggle('open');
  icon.textContent = open ? '▲' : '▼';
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('species-filter').addEventListener('change', render);
render();
</script>
